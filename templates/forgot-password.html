<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - BinhSport</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_reg.css') }}">
</head>
<body>
    <header class="auth-header">
        <a href="/" class="back-btn">← Quay lại trang chủ</a>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h1>Quên mật khẩu</h1>
            <p class="subtitle">Nhập email của bạn, chúng tôi sẽ gửi hướng dẫn đặt lại mật khẩu.</p>

            <form method="POST" action="/forgot-password">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Nhập email của bạn" required>
                </div>

                <button type="submit" class="submit-btn">Gửi hướng dẫn đặt lại</button>
            </form>

            <div class="auth-footer">
                Quay lại <a href="/login">Đăng nhập</a>
            </div>
        </div>
    </div>
</body>
</html>
