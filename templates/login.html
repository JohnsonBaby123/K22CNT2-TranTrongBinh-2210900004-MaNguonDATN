<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - BinhSport</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_reg.css') }}">
</head>
<body>
    <header class="auth-header">
        <a href="/" class="back-btn">← Quay lại trang chủ</a>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h1>Đăng nhập</h1>
            <p class="subtitle">Đăng nhập để tiếp tục mua sắm sản phẩm thể thao yêu thích của bạn.</p>

            {% if message %}
                <div style="margin: 0.75rem 0 1rem; padding: 0.75rem 1rem; border-radius: 10px; background: rgba(34, 197, 94, 0.12); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.35);">
                    {{ message }}
                </div>
            {% endif %}

            {% if error %}
                <div style="margin: 0.75rem 0 1rem; padding: 0.75rem 1rem; border-radius: 10px; background: rgba(239, 68, 68, 0.12); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.35);">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST" action="{{ url_for('login', next=request.args.get('next')) }}">
                <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
                <div class="form-group">
                    <label for="email">Email hoặc tên đăng nhập</label>
                    <input type="text" id="email" name="email" placeholder="Nhập email hoặc tên đăng nhập" required>
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                </div>

                <div class="form-actions">
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Ghi nhớ tôi</label>
                    </div>
                    <a href="/forgot-password">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="submit-btn">Đăng nhập</button>
            </form>

            <div class="auth-footer">
                Chưa có tài khoản? <a href="/register">Đăng ký ngay</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
