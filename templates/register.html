<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - BinhSport</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login_reg.css') }}">
</head>
<body>
    <header class="auth-header">
        <a href="/" class="back-btn">← Quay lại trang chủ</a>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h1>Đăng ký</h1>
            <p class="subtitle">Tạo tài khoản mới và bắt đầu mua sắm tại BinhSport.</p>

            <form method="POST" action="/register">
                <div class="form-row">
                    <div class="form-group">
                        <label for="first_name">Họ</label>
                        <input type="text" id="first_name" name="first_name" placeholder="Họ của bạn" required>
                    </div>
                    <div class="form-group">
                        <label for="last_name">Tên</label>
                        <input type="text" id="last_name" name="last_name" placeholder="Tên của bạn" required>
                    </div>
                </div>

                <div class="form-group full">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Nhập email" required>
                </div>

                <div class="form-group full">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" placeholder="Chọn tên đăng nhập" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" name="password" placeholder="Mật khẩu" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Xác nhận mật khẩu</label>
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Xác nhận mật khẩu" required>
                    </div>
                </div>

                <div class="form-group full">
                    <label for="phone">Số điện thoại (tùy chọn)</label>
                    <input type="tel" id="phone" name="phone" placeholder="Số điện thoại">
                </div>

                <div class="form-group checkbox-group full" style="margin-bottom: 1.5rem;">
                    <input type="checkbox" id="agree" name="agree" required>
                    <label for="agree">Tôi đồng ý với <a href="#" style="color: var(--accent);">Điều khoản dịch vụ</a> và <a href="#" style="color: var(--accent);">Chính sách bảo mật</a></label>
                </div>

                <button type="submit" class="submit-btn">Tạo tài khoản</button>
            </form>

            <div class="auth-footer">
                Đã có tài khoản? <a href="/login">Đăng nhập</a>
            </div>
        </div>
    </div>
</body>
</html>
